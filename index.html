<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Radar System</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            color:#222;
            padding:40px;
            border-radius:15px;
            width:450px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        h1{
            margin-bottom:10px;
        }

        p{
            margin-bottom:20px;
            color:#555;
        }

        #qrcode{
            display:flex;
            justify-content:center;
            margin:20px 0;
        }

        a{
            display:inline-block;
            margin-top:15px;
            background:#2563eb;
            color:white;
            padding:12px 25px;
            text-decoration:none;
            border-radius:8px;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Arduino Radar System</h1>

    <p>
        Scan the QR Code below to open the GitHub Repository.
    </p>

    <div id="qrcode"></div>

    <a href="Radar system" target="_blank">
        Go to System
    </a>

</div>



</body>
</html>
